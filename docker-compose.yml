version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: findutabs-postgres
    environment:
      POSTGRES_DB: findutabs
      POSTGRES_USER: findutabs
      POSTGRES_PASSWORD: findutabs123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findutabs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - findutabs-network

  redis:
    image: redis:7-alpine
    container_name: findutabs-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - findutabs-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: findutabs-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: findutabs
      DB_USERNAME: findutabs
      DB_PASSWORD: findutabs123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-must-be-at-least-256-bits-long
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - findutabs-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: findutabs-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - findutabs-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  findutabs-network:
    driver: bridge
